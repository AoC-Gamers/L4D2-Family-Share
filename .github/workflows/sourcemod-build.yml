name: SourceMod Build

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    paths:
      - .github/workflows/sourcemod-build.yml
      - scripts/ci-build-sourcemod.sh
      - scripts/ci-package-release-assets.sh
      - scripts/ci-validate-artifact.sh
      - scripts/fetch-sourcemod.py
      - scripts/build-local.py
      - scripts/stage-artifact.py
      - scripts/package-release.py
      - plugin-package-map.json
      - addons/sourcemod/**
      - CHANGELOG.md
      - README.md
  workflow_dispatch:

concurrency:
  group: sourcemod-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  SOURCEMOD_VERSION: "1.12"

jobs:
  deps-smx:
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes python3 make

      - name: Resolve dependency cache key
        id: cache-key
        shell: bash
        run: |
          echo "key=smx-deps-${{ runner.os }}-${{ hashFiles('scripts/fetch-sourcemod.py', 'scripts/build-local.py', 'scripts/stage-artifact.py', 'scripts/package-release.py', 'plugin-package-map.json', 'Makefile') }}" >> "$GITHUB_OUTPUT"

      - name: Restore dependency cache
        id: deps-cache-restore
        uses: actions/cache/restore@v5
        with:
          path: deps
          key: ${{ steps.cache-key.outputs.key }}

      - name: Fetch SourceMod dependencies
        if: steps.deps-cache-restore.outputs.cache-hit != 'true'
        run: make deps-smx PYTHON=python3 SOURCEMOD_VERSION="${SOURCEMOD_VERSION}" SMX_PLATFORM=linux

      - name: Save dependency cache
        if: steps.deps-cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: deps
          key: ${{ steps.cache-key.outputs.key }}

  build-smx:
    runs-on: ubuntu-latest
    needs: deps-smx

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes python3 make

      - name: Restore dependency cache
        uses: actions/cache/restore@v5
        with:
          path: deps
          key: ${{ needs.deps-smx.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: Build SMX
        run: make build-smx PYTHON=python3 SPCOMP="deps/sourcemod-linux/addons/sourcemod/scripting/spcomp"

      - name: Upload SMX build tree
        uses: actions/upload-artifact@v6
        with:
          name: smx-build
          path: .build/smx
          if-no-files-found: error
          retention-days: 1

      - name: Upload compile log
        uses: actions/upload-artifact@v6
        with:
          name: smx-compile-log
          path: deps/build-smx-compile.log
          if-no-files-found: error
          retention-days: 1

  release:
    runs-on: ubuntu-latest
    needs: build-smx

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes python3 make

      - name: Download SMX build tree
        uses: actions/download-artifact@v8
        with:
          name: smx-build
          path: .build/smx

      - name: Download compile log
        uses: actions/download-artifact@v8
        with:
          name: smx-compile-log
          path: deps

      - name: Package SMX tree
        run: make package-smx PYTHON=python3

      - name: Stage artifact
        run: |
          python3 ./scripts/stage-artifact.py . ./.build/package-smx ./deps/build-smx-compile.log
          bash ./scripts/ci-validate-artifact.sh

      - name: Resolve artifact channel
        id: artifact
        shell: bash
        run: |
          case "${GITHUB_REF_NAME}" in
            main)
              echo "version=latest" >> "$GITHUB_OUTPUT"
              echo "basename=l4d2-family-share-latest" >> "$GITHUB_OUTPUT"
              echo "tag=channel/latest" >> "$GITHUB_OUTPUT"
              echo "release_name=Latest" >> "$GITHUB_OUTPUT"
              echo "prerelease=false" >> "$GITHUB_OUTPUT"
              ;;
            develop)
              echo "version=develop" >> "$GITHUB_OUTPUT"
              echo "basename=l4d2-family-share-develop" >> "$GITHUB_OUTPUT"
              echo "tag=channel/develop" >> "$GITHUB_OUTPUT"
              echo "release_name=Develop" >> "$GITHUB_OUTPUT"
              echo "prerelease=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "version=pr-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
              echo "basename=l4d2-family-share-pr-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Package SourceMod artifact
        run: make release PYTHON=python3 RELEASE_BASENAME="${{ steps.artifact.outputs.basename }}"

      - name: Upload release zip
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.artifact.outputs.basename }}
          path: dist/release/${{ steps.artifact.outputs.basename }}.zip
          if-no-files-found: error
          retention-days: 14

      - name: Move channel tag
        if: github.event_name != 'pull_request' && (github.ref_name == 'main' || github.ref_name == 'develop')
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "${{ steps.artifact.outputs.tag }}" "$GITHUB_SHA"
          git push origin "refs/tags/${{ steps.artifact.outputs.tag }}" --force

      - name: Publish channel release
        if: github.event_name != 'pull_request' && (github.ref_name == 'main' || github.ref_name == 'develop')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ steps.artifact.outputs.tag }}"
          title="${{ steps.artifact.outputs.release_name }}"
          asset="dist/release/${{ steps.artifact.outputs.basename }}.zip"

          if gh release view "$tag" >/dev/null 2>&1; then
            if [[ "${{ steps.artifact.outputs.prerelease }}" == "true" ]]; then
              gh release edit "$tag" --title "$title" --prerelease
            else
              gh release edit "$tag" --title "$title"
            fi
          else
            if [[ "${{ steps.artifact.outputs.prerelease }}" == "true" ]]; then
              gh release create "$tag" --title "$title" --prerelease --latest=false --target "$GITHUB_SHA"
            else
              gh release create "$tag" --title "$title" --latest=false --target "$GITHUB_SHA"
            fi
          fi

          gh release upload "$tag" "$asset" --clobber
