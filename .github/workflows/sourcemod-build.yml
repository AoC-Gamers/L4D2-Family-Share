name: SourceMod Build

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    paths:
      - .github/workflows/sourcemod-build.yml
      - scripts/ci-build-sourcemod.sh
      - scripts/ci-package-release-assets.sh
      - scripts/ci-validate-artifact.sh
      - addons/sourcemod/**
      - CHANGELOG.md
  workflow_dispatch:
    inputs:
      sourcemod_version:
        description: SourceMod version to download
        required: false
        default: "1.12"

concurrency:
  group: sourcemod-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  SOURCEMOD_VERSION: ${{ github.event.inputs.sourcemod_version || '1.12' }}
  SOURCEMOD_ARCHIVE_URL: https://www.sourcemod.net/latest.php?os=linux&version=${{ github.event.inputs.sourcemod_version || '1.12' }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install SourceMod build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes curl tar python3

      - name: Show SourceMod version
        run: |
          echo "SOURCEMOD_VERSION=${SOURCEMOD_VERSION}"
          echo "SOURCEMOD_ARCHIVE_URL=${SOURCEMOD_ARCHIVE_URL}"

      - name: Verify GitHub CLI
        if: github.event_name != 'pull_request' && (github.ref_name == 'main' || github.ref_name == 'develop')
        run: gh --version

      - name: Compile SourceMod plugin
        run: bash ./scripts/ci-build-sourcemod.sh

      - name: Validate SourceMod artifact
        run: bash ./scripts/ci-validate-artifact.sh

      - name: Resolve artifact channel
        id: artifact
        shell: bash
        run: |
          case "${GITHUB_REF_NAME}" in
            main)
              echo "version=latest" >> "$GITHUB_OUTPUT"
              echo "basename=l4d2-family-share-latest" >> "$GITHUB_OUTPUT"
              echo "tag=channel/latest" >> "$GITHUB_OUTPUT"
              echo "release_name=Latest" >> "$GITHUB_OUTPUT"
              echo "prerelease=false" >> "$GITHUB_OUTPUT"
              ;;
            develop)
              echo "version=develop" >> "$GITHUB_OUTPUT"
              echo "basename=l4d2-family-share-develop" >> "$GITHUB_OUTPUT"
              echo "tag=channel/develop" >> "$GITHUB_OUTPUT"
              echo "release_name=Develop" >> "$GITHUB_OUTPUT"
              echo "prerelease=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "version=pr-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
              echo "basename=l4d2-family-share-pr-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Package SourceMod artifact
        env:
          RELEASE_BASENAME: ${{ steps.artifact.outputs.basename }}
          RELEASE_VERSION: ${{ steps.artifact.outputs.version }}
        run: bash ./scripts/ci-package-release-assets.sh

      - name: Upload release zip
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.artifact.outputs.basename }}
          path: dist/release/${{ steps.artifact.outputs.basename }}.zip
          if-no-files-found: error
          retention-days: 14

      - name: Move channel tag
        if: github.event_name != 'pull_request' && (github.ref_name == 'main' || github.ref_name == 'develop')
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "${{ steps.artifact.outputs.tag }}" "$GITHUB_SHA"
          git push origin "refs/tags/${{ steps.artifact.outputs.tag }}" --force

      - name: Publish channel release
        if: github.event_name != 'pull_request' && (github.ref_name == 'main' || github.ref_name == 'develop')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ steps.artifact.outputs.tag }}"
          title="${{ steps.artifact.outputs.release_name }}"
          asset="dist/release/${{ steps.artifact.outputs.basename }}.zip"

          if gh release view "$tag" >/dev/null 2>&1; then
            if [[ "${{ steps.artifact.outputs.prerelease }}" == "true" ]]; then
              gh release edit "$tag" --title "$title" --prerelease
            else
              gh release edit "$tag" --title "$title"
            fi
          else
            if [[ "${{ steps.artifact.outputs.prerelease }}" == "true" ]]; then
              gh release create "$tag" --title "$title" --prerelease --latest=false --target "$GITHUB_SHA"
            else
              gh release create "$tag" --title "$title" --latest=false --target "$GITHUB_SHA"
            fi
          fi

          gh release upload "$tag" "$asset" --clobber
