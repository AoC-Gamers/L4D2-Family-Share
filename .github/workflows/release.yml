name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  SOURCEMOD_VERSION: "1.12"

jobs:
  prepare-release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    outputs:
      component: ${{ steps.release.outputs.component }}
      version: ${{ steps.release.outputs.version }}
      basename: ${{ steps.release.outputs.basename }}
      release_name: ${{ steps.release.outputs.release_name }}
      prerelease: ${{ steps.release.outputs.prerelease }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release
        run: bash ./scripts/ci-resolve-release.sh "${GITHUB_REF_NAME}"

      - name: Ensure tag points to main history
        shell: bash
        run: |
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "Tag ${GITHUB_REF_NAME} does not point to a commit on main." >&2
            exit 1
          fi

  deps-smx:
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes python3 make

      - name: Resolve dependency cache key
        id: cache-key
        shell: bash
        run: |
          echo "key=smx-deps-${{ runner.os }}-${{ hashFiles('scripts/fetch-sourcemod.py', 'scripts/build-local.py', 'scripts/stage-artifact.py', 'scripts/package-release.py', 'plugin-package-map.json', 'Makefile') }}" >> "$GITHUB_OUTPUT"

      - name: Restore dependency cache
        id: deps-cache-restore
        uses: actions/cache/restore@v5
        with:
          path: deps
          key: ${{ steps.cache-key.outputs.key }}

      - name: Fetch SourceMod dependencies
        if: steps.deps-cache-restore.outputs.cache-hit != 'true'
        run: make deps-smx PYTHON=python3 SOURCEMOD_VERSION="${SOURCEMOD_VERSION}" SMX_PLATFORM=linux

      - name: Save dependency cache
        if: steps.deps-cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: deps
          key: ${{ steps.cache-key.outputs.key }}

  build-smx:
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - deps-smx

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes python3 make

      - name: Restore dependency cache
        uses: actions/cache/restore@v5
        with:
          path: deps
          key: ${{ needs.deps-smx.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: Build SMX
        run: make build-smx PYTHON=python3 SPCOMP="deps/sourcemod-linux/addons/sourcemod/scripting/spcomp"

      - name: Upload SMX build tree
        uses: actions/upload-artifact@v6
        with:
          name: smx-build
          path: .build/smx
          if-no-files-found: error
          retention-days: 1

      - name: Upload compile log
        uses: actions/upload-artifact@v6
        with:
          name: smx-compile-log
          path: deps/build-smx-compile.log
          if-no-files-found: error
          retention-days: 1

  release:
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - build-smx

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes python3 make

      - name: Download SMX build tree
        uses: actions/download-artifact@v8
        with:
          name: smx-build
          path: .build/smx

      - name: Download compile log
        uses: actions/download-artifact@v8
        with:
          name: smx-compile-log
          path: deps

      - name: Package SMX tree
        run: make package-smx PYTHON=python3

      - name: Stage artifact
        run: |
          python3 ./scripts/stage-artifact.py . ./.build/package-smx ./deps/build-smx-compile.log
          bash ./scripts/ci-validate-artifact.sh

      - name: Package release assets
        run: make release PYTHON=python3 RELEASE_BASENAME="${{ needs.prepare-release.outputs.basename }}"

      - name: Upload release zip artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ needs.prepare-release.outputs.basename }}
          path: dist/release/${{ needs.prepare-release.outputs.basename }}.zip
          if-no-files-found: error
          retention-days: 14

      - name: Extract release notes from changelog
        env:
          RELEASE_VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          mkdir -p dist/release
          bash ./scripts/ci-extract-changelog-release-notes.sh "$RELEASE_VERSION" dist/release/release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          title="${{ needs.prepare-release.outputs.release_name }}"
          asset="dist/release/${{ needs.prepare-release.outputs.basename }}.zip"
          notes="dist/release/release-notes.md"

          if gh release view "$tag" >/dev/null 2>&1; then
            if [[ "${{ needs.prepare-release.outputs.prerelease }}" == "true" ]]; then
              gh release edit "$tag" --title "$title" --notes-file "$notes" --prerelease
            else
              gh release edit "$tag" --title "$title" --notes-file "$notes" --latest
            fi

            gh release upload "$tag" "$asset" --clobber
            exit 0
          fi

          if [[ "${{ needs.prepare-release.outputs.prerelease }}" == "true" ]]; then
            gh release create "$tag" "$asset" --title "$title" --notes-file "$notes" --verify-tag --prerelease --latest=false
          else
            gh release create "$tag" "$asset" --title "$title" --notes-file "$notes" --verify-tag --latest
          fi
