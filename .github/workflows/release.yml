name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      sourcemod_version:
        description: SourceMod version to download
        required: false
        default: "1.12"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  SOURCEMOD_VERSION: ${{ github.event.inputs.sourcemod_version || '1.12' }}
  SOURCEMOD_ARCHIVE_URL: https://www.sourcemod.net/latest.php?os=linux&version=${{ github.event.inputs.sourcemod_version || '1.12' }}

jobs:
  prepare-release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    outputs:
      component: ${{ steps.release.outputs.component }}
      version: ${{ steps.release.outputs.version }}
      basename: ${{ steps.release.outputs.basename }}
      release_name: ${{ steps.release.outputs.release_name }}
      prerelease: ${{ steps.release.outputs.prerelease }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release
        run: bash ./scripts/ci-resolve-release.sh "${GITHUB_REF_NAME}"

      - name: Ensure tag points to main history
        shell: bash
        run: |
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "Tag ${GITHUB_REF_NAME} does not point to a commit on main." >&2
            exit 1
          fi

  create-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: prepare-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install SourceMod build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes curl tar python3

      - name: Show SourceMod version
        run: |
          echo "SOURCEMOD_VERSION=${SOURCEMOD_VERSION}"
          echo "SOURCEMOD_ARCHIVE_URL=${SOURCEMOD_ARCHIVE_URL}"

      - name: Verify GitHub CLI
        run: gh --version

      - name: Build SourceMod artifact
        run: bash ./scripts/ci-build-sourcemod.sh

      - name: Validate SourceMod artifact
        run: bash ./scripts/ci-validate-artifact.sh

      - name: Package release assets
        env:
          RELEASE_BASENAME: ${{ needs.prepare-release.outputs.basename }}
          RELEASE_VERSION: ${{ needs.prepare-release.outputs.version }}
        run: bash ./scripts/ci-package-release-assets.sh

      - name: Upload release zip artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ needs.prepare-release.outputs.basename }}
          path: dist/release/${{ needs.prepare-release.outputs.basename }}.zip
          if-no-files-found: error
          retention-days: 14

      - name: Extract release notes from changelog
        env:
          RELEASE_VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          mkdir -p dist/release
          bash ./scripts/ci-extract-changelog-release-notes.sh "$RELEASE_VERSION" dist/release/release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          title="${{ needs.prepare-release.outputs.release_name }}"
          asset="dist/release/${{ needs.prepare-release.outputs.basename }}.zip"
          notes="dist/release/release-notes.md"

          if gh release view "$tag" >/dev/null 2>&1; then
            if [[ "${{ needs.prepare-release.outputs.prerelease }}" == "true" ]]; then
              gh release edit "$tag" --title "$title" --notes-file "$notes" --prerelease
            else
              gh release edit "$tag" --title "$title" --notes-file "$notes" --latest
            fi

            gh release upload "$tag" "$asset" --clobber
            exit 0
          fi

          if [[ "${{ needs.prepare-release.outputs.prerelease }}" == "true" ]]; then
            gh release create "$tag" "$asset" --title "$title" --notes-file "$notes" --verify-tag --prerelease --latest=false
          else
            gh release create "$tag" "$asset" --title "$title" --notes-file "$notes" --verify-tag --latest
          fi
